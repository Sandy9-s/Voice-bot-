<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Sandy Voice Agent</h1>

        </header>

        <main class="chat-interface">
            <div id="status-indicator" class="status-indicator">
                <div class="orb"></div>
                <span id="status-text">System Idle</span>
            </div>

            <div id="transcript-container" class="transcript-container">
                <div class="message system-message">
                    <p>Click the microphone to begin talking naturally. I'm connected securely to AI !</p>
                </div>
            </div>

            <div class="controls">
                <button id="mic-btn" class="mic-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C10.3431 2 9 3.34315 9 5V11C9 12.6569 10.3431 14 12 14C13.6569 14 15 12.6569 15 11V5C15 3.34315 13.6569 2 12 2Z"
                            fill="currentColor" />
                        <path d="M19 10V11C19 14.866 15.866 18 12 18C8.13401 18 5 14.866 5 11V10" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" />
                        <path d="M12 18V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span id="mic-btn-text">Start Conversation</span>
                </button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
